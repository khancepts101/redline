route:
  receiver: default
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # The default receiver is intentionally empty so the demo starts without any
  # external credentials; firing alerts are still visible in the Alertmanager
  # UI at http://localhost:9093. Wire a real integration for production, e.g.:
  #
  # - name: default
  #   slack_configs:
  #     - api_url: https://hooks.slack.com/services/XXX/YYY/ZZZ
  #       channel: "#alerts"
  #
  # or webhook_configs / pagerduty_configs / email_configs.
  - name: default
