name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25.x', cache: true}
      - run: go test ./...
      - run: go vet ./...
      - run: go run ./cmd/promrule-lint ./alerts
      - run: go build ./cmd/...
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.25.x', cache: true}
      - run: go test ./benchmarks -run '^$' -bench . -benchmem | tee benchmark.txt
      - uses: actions/upload-artifact@v4
        with: {name: benchmark, path: benchmark.txt}
