global:
  scrape_interval: 5s
rule_files: ["/etc/prometheus/alerts/*.yml"]
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: demo
    static_configs:
      - targets: ["demo:8080"]
  - job_name: cardinality-guard
    static_configs:
      - targets: ["cardinality-guard:9091"]
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
