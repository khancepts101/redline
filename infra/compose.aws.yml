services:
  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=7d", "--enable-feature=exemplar-storage"]
    volumes:
      - ./prometheus.aws.yml:/etc/prometheus/prometheus.yml:ro
      - ../alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    mem_limit: 256m

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: marcusolsson-json-datasource
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    mem_limit: 256m
    depends_on: [prometheus]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
      POSTGRES_DB: glitchtip
    command: ["postgres", "-c", "shared_buffers=64MB", "-c", "max_connections=30"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    mem_limit: 320m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    mem_limit: 96m

  glitchtip:
    image: glitchtip/glitchtip:v5.1.1
    restart: unless-stopped
    environment: &glitchtip-env
      DATABASE_URL: postgres://glitchtip:glitchtip@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?required}
      PORT: "8000"
      GLITCHTIP_DOMAIN: https://${GLITCHTIP_DOMAIN:?required}
      DEFAULT_FROM_EMAIL: redline@localhost
      EMAIL_URL: consolemail://
      CELERY_WORKER_CONCURRENCY: "1"
    ports: ["${REDLINE_PRIVATE_IP:?required}:8000:8000"]
    mem_limit: 384m
    depends_on: [postgres, redis]

  glitchtip-worker:
    image: glitchtip/glitchtip:v5.1.1
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip-env
    mem_limit: 384m
    depends_on: [postgres, redis]

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes: ["../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro"]
    mem_limit: 64m

  pushgateway:
    image: prom/pushgateway:v1.11.1
    restart: unless-stopped
    ports: ["${REDLINE_PRIVATE_IP:?required}:9091:9091"]
    mem_limit: 64m

  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?required}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:?required}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?required}
      PROMETHEUS_DOMAIN: ${PROMETHEUS_DOMAIN:?required}
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 96m
    depends_on: [grafana, glitchtip, prometheus]

  demo:
    build:
      context: ..
      args: {COMMAND: demo-service}
    restart: unless-stopped
    environment:
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
    mem_limit: 64m

  loadgen:
    build:
      context: ..
      args: {COMMAND: loadgen}
    restart: unless-stopped
    command: ["-url=http://demo:8080/api/work", "-rps=10", "-error-rate=0.08"]
    mem_limit: 32m
    depends_on: [demo]

  cardinality-guard:
    build:
      context: ..
      args: {COMMAND: cardinality-guard}
    restart: unless-stopped
    command: ["-prometheus=http://prometheus:9090", "-warn=10000", "-hard=50000"]
    mem_limit: 64m
    depends_on: [prometheus]

  demo-cron:
    build:
      context: ..
      args: {COMMAND: demo-cron-job}
    restart: unless-stopped
    environment:
      PUSHGATEWAY_URL: http://pushgateway:9091
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
    mem_limit: 32m
    depends_on: [pushgateway]

volumes:
  prometheus-data: {}
  grafana-data: {}
  postgres-data: {}
  caddy-data: {}
  caddy-config: {}
